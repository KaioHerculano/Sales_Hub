<div class="row g-4 mb-4">
    <div class="col-12 col-sm-6 col-md-3">
        <div class="premium-card p-4 d-flex align-items-center gap-3">
            <div class="rounded-4 d-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary" style="width: 56px; height: 56px;">
                <i class="bi bi-cart-check-fill fs-3"></i>
            </div>
            <div>
                <div class="text-muted small fw-medium">Qtd de Vendas</div>
                <div class="fs-4 fw-bold mb-0">{{ sales_metrics.total_sales }}</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
        <div class="premium-card p-4 d-flex align-items-center gap-3">
            <div class="rounded-4 d-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger" style="width: 56px; height: 56px;">
                <i class="bi bi-box-seam-fill fs-3"></i>
            </div>
            <div>
                <div class="text-muted small fw-medium">Produtos Vendidos</div>
                <div class="fs-4 fw-bold mb-0">{{ sales_metrics.total_products_sold }}</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
        <div class="premium-card p-4 d-flex align-items-center gap-3">
            <div class="rounded-4 d-flex align-items-center justify-content-center bg-warning bg-opacity-10 text-warning" style="width: 56px; height: 56px;">
                <i class="bi bi-currency-dollar fs-3"></i>
            </div>
            <div>
                <div class="text-muted small fw-medium">Valor das Vendas</div>
                <div class="fs-4 fw-bold mb-0">R$ {{ sales_metrics.total_sales_value }}</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
        <div class="premium-card p-4 d-flex align-items-center gap-3">
            <div class="rounded-4 d-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success" style="width: 56px; height: 56px;">
                <i class="bi bi-graph-up-arrow fs-3"></i>
            </div>
            <div>
                <div class="text-muted small fw-medium">Lucro Líquido</div>
                <div class="fs-4 fw-bold mb-0">R$ {{ sales_metrics.total_sales_profit }}</div>
            </div>
        </div>
    </div>
</div>
