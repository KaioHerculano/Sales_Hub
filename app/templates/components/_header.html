<style>
    .top-bar {
        height: 64px;
        position: fixed;
        top: 0;
        right: 0;
        left: var(--sidebar-width);
        z-index: 1030;
        border-bottom: 1px solid var(--glass-border);
        display: flex;
        align-items: center;
        padding: 0 2rem;
        transition: all 0.3s ease;
    }

    body:not(.sidebar-enabled) .top-bar {
        left: 0;
    }

    @media (max-width: 991.98px) {
        .top-bar {
            left: 0 !important;
        }
    }

    .user-profile {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 16px;
        border-radius: 12px;
        background: rgba(99, 102, 241, 0.05);
        border: 1px solid var(--glass-border);
    }
</style>

<header class="top-bar glass-panel">
    <div class="d-flex align-items-center w-100 justify-content-between">
        <div class="d-flex align-items-center gap-3">
            <button class="btn d-lg-none p-0 border-0" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas">
                <i class="bi bi-list fs-2"></i>
            </button>
            <h1 class="fs-5 fw-semibold mb-0 d-none d-sm-block">
                {% block page_title %}Dashboard{% endblock %}
            </h1>
        </div>

        <div class="d-flex align-items-center gap-4">
            {% if user.is_authenticated %}
            <div class="user-profile d-none d-md-flex">
                <div class="text-end">
                    <div class="fw-semibold small">{{ user.username }}</div>
                    <div class="text-muted" style="font-size: 0.7rem;">{{ user.profile.company.name }}</div>
                </div>
                <div class="bg-primary rounded-circle d-flex align-items-center justify-content-center text-white" style="width: 36px; height: 36px; font-weight: 600;">
                    {{ user.username|first|upper }}
                </div>
            </div>
            {% endif %}

            <button onclick="toggleTheme()" class="theme-toggle" id="themeButton">
                <i id="themeIcon" class="bi bi-sun-fill fs-5"></i>
            </button>
        </div>
    </div>
</header>
