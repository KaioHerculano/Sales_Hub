<div class="row g-4 mb-4">
    <div class="col-12 col-sm-6 col-md-3">
        <div class="premium-card p-4 d-flex align-items-center gap-3">
            <div class="rounded-4 d-flex align-items-center justify-content-center bg-info bg-opacity-10 text-info" style="width: 56px; height: 56px;">
                <i class="bi bi-box-fill fs-3"></i>
            </div>
            <div>
                <div class="text-muted small fw-medium">Quantidade Total</div>
                <div class="fs-4 fw-bold mb-0">{{ product_metrics.total_quantity }}</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
        <div class="premium-card p-4 d-flex align-items-center gap-3">
            <div class="rounded-4 d-flex align-items-center justify-content-center bg-danger bg-opacity-10 text-danger" style="width: 56px; height: 56px;">
                <i class="bi bi-cash-stack fs-3"></i>
            </div>
            <div>
                <div class="text-muted small fw-medium">Custo Total</div>
                <div class="fs-4 fw-bold mb-0">R$ {{ product_metrics.total_cost_price }}</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
        <div class="premium-card p-4 d-flex align-items-center gap-3">
            <div class="rounded-4 d-flex align-items-center justify-content-center bg-warning bg-opacity-10 text-warning" style="width: 56px; height: 56px;">
                <i class="bi bi-wallet2 fs-3"></i>
            </div>
            <div>
                <div class="text-muted small fw-medium">Valor Total</div>
                <div class="fs-4 fw-bold mb-0">R$ {{ product_metrics.total_selling_price }}</div>
            </div>
        </div>
    </div>

    <div class="col-12 col-sm-6 col-md-3">
        <div class="premium-card p-4 d-flex align-items-center gap-3">
            <div class="rounded-4 d-flex align-items-center justify-content-center bg-success bg-opacity-10 text-success" style="width: 56px; height: 56px;">
                <i class="bi bi-graph-up-arrow fs-3"></i>
            </div>
            <div>
                <div class="text-muted small fw-medium">Lucro Estimado</div>
                <div class="fs-4 fw-bold mb-0">R$ {{ product_metrics.total_profit }}</div>
            </div>
        </div>
    </div>
</div>
