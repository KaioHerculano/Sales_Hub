<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito | Sales Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-card {
            max-width: 500px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 2rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .icon-box {
            width: 80px;
            height: 80px;
            background: #fff7ed;
            color: #f97316;
            border-radius: 1.5rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-box shadow-sm">
            <i class="bi bi-shield-lock-fill fs-1"></i>
        </div>
        <h1 class="fw-bold mb-3">Empresa não identificada</h1>
        <p class="text-muted mb-4">
            Você não está vinculado a nenhuma empresa ativa no sistema. Por favor, solicite seu vínculo ao administrador para acessar as funcionalidades.
        </p>
        
        <div class="d-grid gap-2">
            {% if user.is_authenticated %}
            <form action="{% url 'logout' %}" method="post" class="w-100">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-danger w-100 py-2 rounded-pill fw-bold">
                    <i class="bi bi-box-arrow-left me-2"></i>Sair do Sistema
                </button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="btn btn-primary py-2 rounded-pill fw-bold">
                Voltar ao Login
            </a>
            {% endif %}
        </div>
    </div>
</body>
</html>
